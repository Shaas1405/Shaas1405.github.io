<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>2nd Page</title>
        <link rel="stylesheet" href="styles.css" />
    </head>

    <body style="margin: 0px; background-color: white">
        <div
            class="navbar"
            style="
                margin: 0px;
                width: 100%;
                align-content: center;
                text-align: center;
                background-color: aquamarine;
                padding: 0px;
                padding-top: 0.6em;
                padding-bottom: 0.6em;
                font-size: 2em;
                display: flex;
                flex-direction: column;
            ">
            Equipment Quality Check
            
            <p style="margin: 0; font-size: 0.6em">Equipment ID:</p>
            <p style="margin: 0; font-size: 0.8em">ID HERE</p>
        </div>

        <form
            style="
                display: flex;
                flex-direction: column;
                margin-left: 2em;
            ">
            <div
                style="
                    display: flex;
                    flex-direction: row;
                    gap: 2em;
                    margin-top: 2em;
                ">
                <label style="font-size: 1.5em"
                    >1. Is the equipment in good shape?</label
                >
                <input
                    style="margin: 0; padding: 0; width: 2em"
                    type="checkbox" />
                <p style="margin: 0; padding: 0; font-size: 1.5em">YES</p>
                <input
                    style="margin: 0; padding: 0; width: 2em"
                    type="checkbox" />
                <p style="margin: 0; padding: 0; font-size: 1.5em">NO</p>
            </div>

            <div
                style="
                    display: flex;
                    flex-direction: row;
                    gap: 2em;
                    margin-top: 2em;
                ">
                <label style="font-size: 1.5em"
                    >2. Does the equipment have defects in paint?</label
                >
                <input
                    style="margin: 0; padding: 0; width: 2em"
                    type="checkbox" />
                <p style="margin: 0; padding: 0; font-size: 1.5em">Good</p>
                <input
                    style="margin: 0; padding: 0; width: 2em"
                    type="checkbox" />
                <p style="margin: 0; padding: 0; font-size: 1.5em">Moderate</p>
                <input
                    style="margin: 0; padding: 0; width: 2em"
                    type="checkbox" />
                <p style="margin: 0; padding: 0; font-size: 1.5em">Bad</p>
            </div>

            <div
                style="
                    display: flex;
                    flex-direction: row;
                    gap: 2em;
                    margin-top: 2em;
                ">
                
                <label style="font-size: 1.5em"
                    >3. Is the equipment functionally stable?</label
                >
                <input
                    style="margin: 0; padding: 0; width: 2em"
                    type="checkbox" />
                <p style="margin: 0; padding: 0; font-size: 1.5em">YES</p>
                <input
                    style="margin: 0; padding: 0; width: 2em"
                    type="checkbox" />
                <p style="margin: 0; padding: 0; font-size: 1.5em">NO</p>
            </div>
            <label style="margin-bottom: 1em; margin-top: 1em; font-size: 1.5em">Upload Image of Equipment Here:</label>
            <input style="margin-bottom: 1em; font-size: 1.5em" type="file"/>
            
            <label style=" font-size: 1.5em">Extra Notes:</label>
            <input type="text" style="width: 80%; font-size: 1.5em; margin-bottom: 1em; padding-bottom: 3em;" placeholder="type extra notes here, extra lines are not allowed. Enter will submit the page."/>
            
            <input type="submit" style="width: 5em; font-size: 2em" />
        </form>
        
        
        
        <a
            href="index.html"
            style="
                border-style: solid;
                text-decoration: none;
                color: black;
                padding: 1em;
                float: right;
                margin-right: 2em;
            "
            >BACK</a
        >
    </body>
</html>
